services:
  spider-graph-api:
    build:
      context: .
      dockerfile: Dockerfile
    image: spider-graph-api:latest
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
      # Required for deployment: set the real frontend origin before starting the container.
      APP_SECURITY_CORS_ALLOWED_ORIGINS: ${APP_SECURITY_CORS_ALLOWED_ORIGINS:?set APP_SECURITY_CORS_ALLOWED_ORIGINS}
      APP_SECURITY_RATE_LIMIT_MAX_REQUESTS_PER_MINUTE: ${APP_SECURITY_RATE_LIMIT_MAX_REQUESTS_PER_MINUTE:-10}
      APP_SECURITY_CRAWL_MAX_CONCURRENT_REQUESTS: ${APP_SECURITY_CRAWL_MAX_CONCURRENT_REQUESTS:-1}
      APP_SECURITY_CRAWL_MAX_DEPTH: ${APP_SECURITY_CRAWL_MAX_DEPTH:-3}
      APP_SECURITY_CRAWL_MAX_TIMEOUT: ${APP_SECURITY_CRAWL_MAX_TIMEOUT:-10000}
      APP_SECURITY_CRAWL_MAX_REQUEST_DELAY: ${APP_SECURITY_CRAWL_MAX_REQUEST_DELAY:-2000}
      APP_SECURITY_CRAWL_MAX_PAGES: ${APP_SECURITY_CRAWL_MAX_PAGES:-50}
